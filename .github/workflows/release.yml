name: release

# Build + push the irods-ha OCI image to ghcr.io/openweft/irods-ha.
#
# Trigger policy (per openweft no-autopublish-during-dev rule) :
#   - workflow_dispatch : operator-initiated build (no push)
#   - push:tags ['v*']  : tag-driven release
# NO push:main trigger — that's the whole point.
#
# The image is multi-arch (linux/amd64 + linux/arm64) ; the Dockerfile
# at the repo root drives both stages. The agent binary is cross-built
# pure-Go (CGO=0) so a single buildx invocation handles both arches.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Override tag (default: refs/tags/<current> or 'dev')"
        required: false
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/irods-ha

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: resolve tag
        id: tag
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >>"$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >>"$GITHUB_OUTPUT"
          else
            echo "tag=dev-${GITHUB_SHA::7}" >>"$GITHUB_OUTPUT"
          fi

      - name: resolve build metadata
        id: meta
        run: |
          set -euo pipefail
          echo "commit=$(git rev-parse --short HEAD)" >>"$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >>"$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build + push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          build-args: |
            VERSION=${{ steps.tag.outputs.tag }}
            COMMIT=${{ steps.meta.outputs.commit }}
            DATE=${{ steps.meta.outputs.date }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE }}:latest
