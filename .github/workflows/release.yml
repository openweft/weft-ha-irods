name: release

# Build + push the irods-ha OCI image to ghcr.io/openweft/irods-ha.
#
# Trigger policy (per openweft no-autopublish-during-dev rule) :
#   - workflow_dispatch : operator-initiated build (no push)
#   - push:tags ['v*']  : tag-driven release
# NO push:main trigger — that's the whole point.
#
# Multi-arch via NATIVE runners (matrix split). The previous
# single-job linux/arm64 build was QEMU-emulated and the
# irods/externals (boost + clang16) cross-compile crushed it after
# 3h+ — clang16 LLVM-template emulation either OOMed or
# miscompiled. Native arm64 runners cut the build to ~30min and
# remove the QEMU dependency entirely (rc3 post-mortem 2026-06-23).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Override tag (default: refs/tags/<current> or 'dev')"
        required: false
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/irods-ha

jobs:
  # Per-arch build job. Each runs on a NATIVE runner — no QEMU,
  # no cross-compilation of clang16. Pushes a digest-keyed image
  # to GHCR ; the merge job below stitches them into a manifest.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Free ~25GB of disk before docker buildx kicks off. The
      # ubuntu-latest runner ships with Android SDK / .NET / Haskell
      # / GHC / CodeQL pre-installed that we don't need ; the iRODS
      # source build inside the externalsbuilder stage chews through
      # disk during the clang16 + boost compile (rc5 amd64 hit
      # "dpkg-deb: paste subprocess killed by signal (Broken pipe)"
      # = out-of-disk during the dpkg -i clang16.deb step). The
      # arm64 runner is leaner but we apply the same purge for
      # parity. 2026-06-25 rc6 post-mortem.
      - name: free runner disk
        run: |
          set -eux
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/local/share/powershell || true
          sudo apt-get clean
          docker image prune -af
          df -h /

      - name: resolve tag
        id: tag
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >>"$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >>"$GITHUB_OUTPUT"
          else
            echo "tag=dev-${GITHUB_SHA::7}" >>"$GITHUB_OUTPUT"
          fi

      - name: resolve build metadata
        id: meta
        run: |
          set -euo pipefail
          echo "commit=$(git rev-parse --short HEAD)" >>"$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >>"$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build + push by digest
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          sbom: false
          build-args: |
            VERSION=${{ steps.tag.outputs.tag }}
            COMMIT=${{ steps.meta.outputs.commit }}
            DATE=${{ steps.meta.outputs.date }}
          outputs: |
            type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Stitches the per-arch digests into the multi-arch manifest under
  # both <tag> and 'latest'. Runs after all matrix jobs succeed.
  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: resolve tag
        id: tag
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >>"$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >>"$GITHUB_OUTPUT"
          else
            echo "tag=dev-${GITHUB_SHA::7}" >>"$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }} \
            -t ${{ env.IMAGE }}:latest \
            $(printf "${{ env.IMAGE }}@sha256:%s " *)

      - name: inspect
        run: |
          docker buildx imagetools inspect ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
